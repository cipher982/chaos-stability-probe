<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nearby Prompts, Distant Trajectories</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1012;
      --panel: #17191d;
      --text: #f4f4f4;
      --muted: #a8adb5;
      --accent: #c8402c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .slide {
      display: none;
      width: min(100%, calc(100vh * 16 / 9 - 56px));
      max-width: calc(100vw - 56px);
      aspect-ratio: 16 / 9;
      background: #fafafa;
      box-shadow: 0 18px 70px rgba(0, 0, 0, 0.42);
    }

    .slide.active { display: block; }

    .slide img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #fafafa;
    }

    .hud {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-size: 13px;
      pointer-events: none;
    }

    .hud > div {
      background: rgba(15, 16, 18, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 6px 10px;
      backdrop-filter: blur(8px);
    }

    .progress {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: rgba(255, 255, 255, 0.11);
    }

    .progress span {
      display: block;
      width: 0;
      height: 100%;
      background: var(--accent);
      transition: width 120ms ease;
    }

    @media print {
      body { overflow: visible; background: white; }
      .stage { display: block; height: auto; padding: 0; }
      .slide {
        display: block !important;
        width: 100vw;
        max-width: none;
        box-shadow: none;
        page-break-after: always;
      }
      .hud, .progress { display: none; }
    }
  </style>
</head>
<body>
  <main class="stage" id="stage" aria-live="polite"></main>
  <div class="hud">
    <div>Left/right arrows or click to navigate. Press F for fullscreen.</div>
    <div id="counter">1 / 29</div>
  </div>
  <div class="progress"><span id="progress"></span></div>

  <script>
    const slideCount = 29;
    const stage = document.getElementById("stage");
    const counter = document.getElementById("counter");
    const progress = document.getElementById("progress");
    let current = 0;

    const slides = Array.from({ length: slideCount }, (_, i) => {
      const n = String(i + 1).padStart(3, "0");
      const section = document.createElement("section");
      section.className = "slide";
      section.setAttribute("aria-label", `Slide ${i + 1}`);

      const img = document.createElement("img");
      img.src = `slide_images/slide.${n}.png`;
      img.alt = `Slide ${i + 1}`;
      img.loading = i < 3 ? "eager" : "lazy";
      section.appendChild(img);
      stage.appendChild(section);
      return section;
    });

    function clamp(index) {
      return Math.max(0, Math.min(slideCount - 1, index));
    }

    function show(index, replace = false) {
      slides[current].classList.remove("active");
      current = clamp(index);
      slides[current].classList.add("active");
      counter.textContent = `${current + 1} / ${slideCount}`;
      progress.style.width = `${((current + 1) / slideCount) * 100}%`;
      const url = `#${current + 1}`;
      if (replace) history.replaceState(null, "", url);
      else history.pushState(null, "", url);
    }

    function fromHash() {
      const n = Number(location.hash.replace("#", ""));
      return Number.isFinite(n) && n > 0 ? n - 1 : 0;
    }

    document.addEventListener("keydown", (event) => {
      if (["ArrowRight", "PageDown", " ", "Enter"].includes(event.key)) {
        event.preventDefault();
        show(current + 1);
      } else if (["ArrowLeft", "PageUp", "Backspace"].includes(event.key)) {
        event.preventDefault();
        show(current - 1);
      } else if (event.key.toLowerCase() === "f") {
        event.preventDefault();
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      } else if (event.key === "Home") {
        event.preventDefault();
        show(0);
      } else if (event.key === "End") {
        event.preventDefault();
        show(slideCount - 1);
      }
    });

    document.addEventListener("click", (event) => {
      const leftHalf = event.clientX < window.innerWidth / 2;
      show(current + (leftHalf ? -1 : 1));
    });

    window.addEventListener("popstate", () => show(fromHash(), true));
    show(fromHash(), true);
  </script>
</body>
</html>
